# Local full-stack run that REUSES what's already on your machine:
#   • ~/.ollama  → the LLM/embedding models (no multi-GB re-download)
#   • ~/.kairo   → your real memories (the backend isn't an empty store)
# Stop the native backend/ollama first (they hold ports 8000/11434).
#
#   docker compose -f docker-compose.local.yml up --build
services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ${HOME}/.ollama:/root/.ollama
    ports:
      - "11434:11434"

  backend:
    build: .
    environment:
      KAIRO_HOME: /data
      OLLAMA_HOST: http://ollama:11434
    volumes:
      - ${HOME}/.kairo:/data
    ports:
      - "8000:8000"
    depends_on:
      - ollama

  syncserver:
    build: ./syncserver
    environment:
      KAIRO_SYNC_DIR: /data
    volumes:
      - kairo-sync-data:/data
    ports:
      - "8787:8787"

volumes:
  kairo-sync-data:
